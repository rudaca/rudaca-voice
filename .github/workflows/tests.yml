name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Pint + Feature tests (MySQL)
    runs-on: ubuntu-latest

    # Temporary MySQL that only exists for the duration of this job.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: rudaca_voice_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    # These override phpunit.xml's SQLite defaults so the suite runs on MySQL.
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: rudaca_voice_testing
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, bcmath, intl, pdo, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -uroot -ppassword --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run migrations (MySQL)
        run: php artisan migrate --force

      - name: Build frontend assets
        run: npm run build

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test
